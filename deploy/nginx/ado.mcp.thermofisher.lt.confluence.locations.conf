# Concrete location blocks for the existing Azure DevOps MCP nginx at:
#   /opt/mcp-server/nginx/nginx.conf
#
# Apply these blocks manually inside BOTH existing server blocks for:
#   - listen 80;
#   - listen 443 ssl;
#
# Important:
# - keep the existing /mcp and /health locations untouched
# - keep the existing /.well-known/ location untouched on 443
# - backend target assumes /opt/confluence-mcp/docker-compose.server.yml is running
#   and the container is reachable on Docker network mcp-server_internal

location /confluence/mcp {
    proxy_pass http://confluence-mcp-server:3000/mcp;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-API-Key $http_x_api_key;
    proxy_set_header X-Confluence-Authorization $http_x_confluence_authorization;
    proxy_set_header X-Confluence-Email $http_x_confluence_email;
    proxy_set_header X-Confluence-Api-Token $http_x_confluence_api_token;
    proxy_set_header X-Confluence-Base-Url $http_x_confluence_base_url;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
}

